<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INTERVIEW — เลือกแบบสอบถาม</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
      background: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .logo {
      text-align: center;
      margin-bottom: 48px;
    }
    .logo-icon { font-size: 36px; display: block; margin-bottom: 10px; }
    .logo-title {
      font-size: 28px;
      font-weight: 700;
      color: #f8fafc;
      letter-spacing: .06em;
    }
    .logo-sub { font-size: 14px; color: #64748b; margin-top: 6px; }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      max-width: 680px;
      width: 100%;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 32px 28px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: all .2s ease;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity .2s ease;
      border-radius: inherit;
    }
    .card.home::before { background: linear-gradient(135deg, rgba(37,99,235,.15), rgba(6,182,212,.08)); }
    .card.road::before { background: linear-gradient(135deg, rgba(245,158,11,.12), rgba(239,68,68,.08)); }
    .card:hover { border-color: #475569; transform: translateY(-4px); box-shadow: 0 20px 48px rgba(0,0,0,.4); }
    .card:hover::before { opacity: 1; }
    .card.road { cursor: default; opacity: .6; }
    .card.road:hover { transform: none; box-shadow: none; }

    .card-icon { font-size: 40px; }
    .card-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 999px;
      width: fit-content;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .badge-active { background: rgba(16,185,129,.15); color: #34d399; border: 1px solid rgba(52,211,153,.2); }
    .badge-soon { background: rgba(100,116,139,.15); color: #94a3b8; border: 1px solid rgba(148,163,184,.2); }
    .card-title { font-size: 20px; font-weight: 700; color: #f1f5f9; }
    .card-desc { font-size: 14px; color: #64748b; line-height: 1.6; }
    .card-action {
      margin-top: 8px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
    }
    .card.home .card-action { color: #60a5fa; }
    .card.road .card-action { color: #475569; }

    .footer {
      margin-top: 48px;
      font-size: 12px;
      color: #334155;
    }

    @media (max-width: 600px) {
      .cards { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="logo">
    <span class="logo-icon">◈</span>
    <div class="logo-title">INTERVIEW</div>
    <div class="logo-sub">เลือกประเภทแบบสอบถาม</div>
  </div>

  <div class="cards">
    <a class="card home" href="Home/">
      <span class="card-icon">🏠</span>
      <span class="card-badge badge-active">● พร้อมใช้งาน</span>
      <div class="card-title">Home Interview</div>
      <div class="card-desc">แบบสอบถามสำหรับการสัมภาษณ์และสำรวจความคิดเห็นภายในบ้าน / ในสถานที่</div>
      <div class="card-action">เข้าใช้งาน →</div>
    </a>

    <div class="card road">
      <span class="card-icon">🚗</span>
      <span class="card-badge badge-soon">◌ เร็ว ๆ นี้</span>
      <div class="card-title">Roadside Interview</div>
      <div class="card-desc">แบบสอบถามสำหรับการสัมภาษณ์ริมถนนและภาคสนาม</div>
      <div class="card-action">กำลังพัฒนา</div>
    </div>
  </div>

  <div class="footer">© 2026 INTERVIEW</div>
</body>
</html>
