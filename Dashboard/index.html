<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ส่วนแสดงผล — INTERVIEW</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
      background: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #f1f5f9;
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 14px; color: #64748b; margin-bottom: 32px; }
    a {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 600; color: #64748b;
      text-decoration: none; padding: 8px 16px;
      border-radius: 8px; border: 1px solid #334155;
      transition: all .15s;
    }
    a:hover { color: #f1f5f9; border-color: #475569; background: #1e293b; }
  </style>
</head>
<body>
  <div class="icon">📊</div>
  <h1>ส่วนแสดงผล</h1>
  <p>กำลังพัฒนา — แผนที่และสถิติสรุปผลการสำรวจจากทุกแบบสอบถาม</p>
  <a href="../index.html">◈ กลับหน้าหลัก</a>
</body>
</html>
