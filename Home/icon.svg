<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e40af"/>
      <stop offset=".5" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="house" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- ground -->
  <rect x="40" y="392" width="432" height="6" fill="#fff" opacity=".4"/>

  <!-- chimney -->
  <rect x="340" y="120" width="34" height="80" fill="#1e3a8a" rx="3"/>
  <rect x="336" y="118" width="42" height="10" fill="#1e3a8a" rx="2"/>

  <!-- roof -->
  <path d="M 96 232 L 256 112 L 416 232 Z" fill="#1e3a8a" stroke="#1e3a8a" stroke-width="6" stroke-linejoin="round"/>

  <!-- house body -->
  <rect x="128" y="232" width="256" height="160" rx="8" fill="url(#house)" stroke="#1e3a8a" stroke-width="6"/>

  <!-- door -->
  <rect x="220" y="296" width="72" height="96" fill="#1e3a8a"/>
  <circle cx="278" cy="346" r="5" fill="#fbbf24"/>

  <!-- window left -->
  <rect x="152" y="264" width="48" height="48" fill="#60a5fa" stroke="#1e3a8a" stroke-width="4"/>
  <line x1="176" y1="264" x2="176" y2="312" stroke="#1e3a8a" stroke-width="3"/>
  <line x1="152" y1="288" x2="200" y2="288" stroke="#1e3a8a" stroke-width="3"/>

  <!-- window right -->
  <rect x="312" y="264" width="48" height="48" fill="#60a5fa" stroke="#1e3a8a" stroke-width="4"/>
  <line x1="336" y1="264" x2="336" y2="312" stroke="#1e3a8a" stroke-width="3"/>
  <line x1="312" y1="288" x2="360" y2="288" stroke="#1e3a8a" stroke-width="3"/>
</svg>
