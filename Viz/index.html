<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Viz — แสดงผลการเดินทาง บ้านไผ่</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Sarabun', sans-serif; background: #f8fafc; color: #1e293b; }

    .topbar {
      background: #fff; border-bottom: 1px solid #e2e8f0;
      padding: 0 20px; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .topbar-brand { font-size: 16px; font-weight: 700; color: #0f172a; display: flex; align-items: center; gap: 8px; }
    .back-link {
      font-size: 13px; font-weight: 600; color: #64748b; text-decoration: none;
      padding: 6px 12px; border-radius: 8px; border: 1px solid #e2e8f0;
    }
    .back-link:hover { background: #f1f5f9; color: #1e293b; }

    .toolbar {
      background: #fff; border-bottom: 1px solid #e2e8f0;
      padding: 10px 20px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
    }
    .btn {
      padding: 8px 14px; border-radius: 8px; font-family: inherit; font-size: 13px;
      font-weight: 600; cursor: pointer; border: none; transition: all .15s;
    }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-ghost { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
    .btn-ghost:hover { background: #e2e8f0; }
    .btn-active { background: #eff6ff; color: #2563eb; border: 1.5px solid #2563eb; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .stats-bar {
      background: #fff; border-bottom: 1px solid #e2e8f0;
      padding: 8px 20px; display: flex; gap: 24px; flex-wrap: wrap;
    }
    .stat { font-size: 13px; color: #64748b; }
    .stat strong { color: #1e293b; font-size: 15px; }

    #map { width: 100%; height: calc(100vh - 155px); }

    .panel {
      position: fixed; right: 0; top: 155px; bottom: 0;
      width: 300px; background: #fff; border-left: 1px solid #e2e8f0;
      overflow-y: auto; transform: translateX(100%); transition: transform .25s;
      z-index: 50;
    }
    .panel.open { transform: translateX(0); }
    .panel-header { padding: 14px 16px; border-bottom: 1px solid #e2e8f0; font-weight: 700; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
    .panel-body { padding: 14px 16px; }

    .legend { position: absolute; bottom: 30px; left: 16px; background: rgba(255,255,255,.92); border-radius: 10px; padding: 10px 14px; font-size: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.12); }
    .legend-item { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; }

    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1e293b; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 14px; z-index: 999; }
  </style>
</head>
<body>

<header class="topbar">
  <div class="topbar-brand">📊 แสดงผลการเดินทาง — บ้านไผ่</div>
  <a href="../index.html" class="back-link">◈ เมนูหลัก</a>
</header>

<div class="toolbar">
  <button class="btn btn-primary" id="loadBtn" onclick="Viz.loadData()">☁️ โหลดข้อมูล</button>
  <span style="width:1px;background:#e2e8f0;height:24px;"></span>
  <button class="btn btn-ghost btn-active" id="btnHH" onclick="Viz.showLayer('households')">🏠 ครัวเรือน</button>
  <button class="btn btn-ghost" id="btnOD" onclick="Viz.showLayer('od')">↔ OD สาย</button>
  <button class="btn btn-ghost" id="btnHeat" onclick="Viz.showLayer('heatmap')">🔥 ความหนาแน่น</button>
  <span style="flex:1;"></span>
  <span id="loadStatus" style="font-size:12px;color:#94a3b8;">ยังไม่ได้โหลด</span>
</div>

<div class="stats-bar" id="statsBar" style="display:none;">
  <div class="stat">ครัวเรือน <strong id="s_hh">0</strong></div>
  <div class="stat">สมาชิก <strong id="s_m">0</strong></div>
  <div class="stat">การเดินทาง <strong id="s_t">0</strong></div>
  <div class="stat">มีพิกัด <strong id="s_coords">0</strong></div>
</div>

<div style="position:relative;">
  <div id="map"></div>
  <div class="legend" id="legend">
    <div style="font-size:11px;font-weight:700;color:#64748b;margin-bottom:6px;">สัญลักษณ์</div>
    <div class="legend-item"><div class="legend-dot" style="background:#2563eb;"></div> ครัวเรือน</div>
    <div class="legend-item"><div class="legend-dot" style="background:#10b981;"></div> ต้นทาง</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f59e0b;"></div> ปลายทาง</div>
  </div>
</div>

<div class="panel" id="infoPanel">
  <div class="panel-header">
    <span id="panelTitle">รายละเอียด</span>
    <button onclick="document.getElementById('infoPanel').classList.remove('open')" style="background:none;border:none;cursor:pointer;font-size:18px;color:#94a3b8;">✕</button>
  </div>
  <div class="panel-body" id="panelBody"></div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<!-- Longdo Maps -->
<script src="https://api.longdo.com/map/?key=4ffd5bcaa8a5941163c24dbe2a4401e8"></script>
<!-- Viz logic -->
<script src="js/viz.js"></script>

</body>
</html>
