<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#92400e"/>
      <stop offset=".5" stop-color="#d97706"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="car" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fef3c7"/>
    </linearGradient>
  </defs>

  <!-- rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- ground line -->
  <rect x="40" y="372" width="432" height="6" fill="#fff" opacity=".35"/>

  <!-- road dashed center line going up -->
  <g fill="#fff" opacity=".85">
    <rect x="244" y="76"  width="24" height="40" rx="4"/>
    <rect x="244" y="140" width="24" height="40" rx="4"/>
    <rect x="244" y="204" width="24" height="40" rx="4"/>
    <rect x="244" y="268" width="24" height="40" rx="4"/>
  </g>

  <!-- car body -->
  <g transform="translate(0,4)">
    <!-- main chassis -->
    <path d="M 130 360
             L 156 300
             Q 168 280 192 280
             L 320 280
             Q 344 280 356 300
             L 382 360
             L 382 408
             Q 382 420 370 420
             L 142 420
             Q 130 420 130 408 Z"
          fill="url(#car)" stroke="#9a3412" stroke-width="6"/>
    <!-- windows -->
    <path d="M 178 308
             L 192 296
             L 320 296
             L 334 308
             L 320 348
             L 192 348 Z"
          fill="#7c2d12" opacity=".55"/>
    <!-- window divider -->
    <rect x="252" y="296" width="8" height="52" fill="#9a3412" opacity=".7"/>
    <!-- headlight -->
    <circle cx="372" cy="380" r="8" fill="#fde68a"/>
  </g>

  <!-- wheels -->
  <g>
    <circle cx="186" cy="424" r="34" fill="#1f2937"/>
    <circle cx="186" cy="424" r="14" fill="#fff"/>
    <circle cx="326" cy="424" r="34" fill="#1f2937"/>
    <circle cx="326" cy="424" r="14" fill="#fff"/>
  </g>
</svg>
