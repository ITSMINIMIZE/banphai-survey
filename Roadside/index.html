<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roadside Interview — กำลังพัฒนา</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
      background: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .icon { font-size: 64px; margin-bottom: 24px; display: block; }
    h1 { font-size: 26px; font-weight: 700; color: #f1f5f9; margin-bottom: 10px; }
    p { font-size: 15px; color: #64748b; line-height: 1.6; margin-bottom: 32px; }
    a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #94a3b8;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      transition: all .2s;
    }
    a:hover { border-color: #475569; color: #f1f5f9; }
  </style>
</head>
<body>
  <span class="icon">🚧</span>
  <h1>Roadside Interview</h1>
  <p>โมดูลนี้กำลังอยู่ในระหว่างการพัฒนา<br>จะเปิดให้ใช้งานเร็ว ๆ นี้</p>
  <a href="../index.html">← กลับหน้าหลัก</a>
</body>
</html>
