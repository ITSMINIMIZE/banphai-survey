<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#92400e"/>
      <stop offset=".5" stop-color="#d97706"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="car" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fef3c7"/>
    </linearGradient>
  </defs>
  <!-- maskable: ลายเต็มขอบ ของจริงตรงกลาง 80% safe zone -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- safe zone content centered ~64-448 -->
  <g transform="translate(0,28)">
    <!-- dashed road -->
    <g fill="#fff" opacity=".85">
      <rect x="244" y="86"  width="24" height="36" rx="4"/>
      <rect x="244" y="142" width="24" height="36" rx="4"/>
      <rect x="244" y="198" width="24" height="36" rx="4"/>
    </g>

    <!-- car -->
    <path d="M 138 320
             L 162 268
             Q 174 250 198 250
             L 314 250
             Q 338 250 350 268
             L 374 320
             L 374 360
             Q 374 372 362 372
             L 150 372
             Q 138 372 138 360 Z"
          fill="url(#car)" stroke="#9a3412" stroke-width="6"/>
    <path d="M 184 276
             L 198 264
             L 314 264
             L 328 276
             L 314 308
             L 198 308 Z"
          fill="#7c2d12" opacity=".55"/>
    <rect x="252" y="264" width="8" height="44" fill="#9a3412" opacity=".7"/>

    <!-- wheels -->
    <circle cx="190" cy="376" r="32" fill="#1f2937"/>
    <circle cx="190" cy="376" r="13" fill="#fff"/>
    <circle cx="322" cy="376" r="32" fill="#1f2937"/>
    <circle cx="322" cy="376" r="13" fill="#fff"/>
  </g>
</svg>
